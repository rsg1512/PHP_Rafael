<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vendas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Registro de Venda</h1>
    
    <form method="POST" action="venda.php">
        <div class="campo">
            <label for="cliente">Nome do Cliente:</label>
            <input type="text" id="cliente" name="nome_cliente" required>
        </div>

        <div class="campo checkbox-group">
            <input type="checkbox" id="vip" name="cliente_vip" value="sim">
            <label for="vip">Cliente VIP?</label>
        </div>

        <hr>

        <div class="campo">
            <label for="produto">Nome do Produto:</label>
            <input type="text" id="produto" name="nome_produto" required>
        </div>

        <div class="campo">
            <label for="estoque">Quantidade em Estoque:</label>
            <input type="number" id="estoque" name="qtd_estoque" min="0" required>
        </div>

        <div class="campo">
            <label for="preco">Valor Unitário de Venda (R$):</label>
            <input type="number" id="preco" name="valor_unitario" step="0.01" min="0" required>
        </div>

        <div class="campo">
            <label for="venda">Quantidade Vendida:</label>
            <input type="number" id="venda" name="qtd_vendida" min="1" required>
        </div>

        <input type="submit" value="Registrar Venda">
    </form>

</body>
</html>
